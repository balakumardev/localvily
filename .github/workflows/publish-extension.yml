name: Publish Chrome Extension

on:
  push:
    branches: [main, master]
    paths:
      - "extension/**"
  workflow_dispatch:

jobs:
  publish:
    if: github.ref_name == 'main' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump extension version
        id: bump
        working-directory: extension
        run: |
          current=$(grep -Po '(?<="version": ")[^"]+' manifest.json)
          IFS='.' read -r major minor <<< "$current"
          new_version="$major.$((minor + 1))"
          sed -i "s/\"version\": \"$current\"/\"version\": \"$new_version\"/" manifest.json
          echo "Bumped extension $current → $new_version"
          echo "new=$new_version" >> "$GITHUB_OUTPUT"

      - name: Regenerate inject bundles
        run: |
          npm install
          npm run build:inject

      - name: Create ZIP
        run: cd extension && zip -r ../extension.zip . -x ".*" -x "tests/*"

      - name: Upload & Publish to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: publish
          client_id: ${{ secrets.CWS_CLIENT_ID }}
          client_secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CWS_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CWS_EXTENSION_ID }}
          zip_file: extension.zip

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/manifest.json extension/inject/
          if git diff --cached --quiet; then
            echo "No extension version changes to commit"
            exit 0
          fi
          git commit -m "Bump extension version to ${{ steps.bump.outputs.new }} [skip ci]"
          target_branch="${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            git fetch origin "$target_branch"
            git rebase "origin/$target_branch"
            if git push origin HEAD:"$target_branch"; then
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying..."
            sleep $((attempt * 2))
          done
          echo "Failed to push extension version bump after 3 attempts" >&2
          exit 1
