name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  server:
    name: Server + adapter (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Run server test suite
        working-directory: server
        run: uv run pytest -q

      - name: Run adapter test suite
        run: uv run --with pytest pytest adapters/tests/ -q

  extension:
    name: Extension (node:test + jsdom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run extension unit tests
        run: npm test
